name: BMAD Apex Watch

on:
  schedule:
    - cron: '0 8 * * *' # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run BMAD extractor (auto-promote)
        run: |
          mkdir -p manifests
          python3 scripts/extract_apex_swimlanes.py TODO.md --auto-promote --emit-stories --story-dir docs/stories --manifest manifests/apex_manifest.csv --quiet > APEX_SWIMLANES.md || true

      - name: Manifest summary
        id: manifest
        run: |
          if [ -f manifests/apex_manifest.csv ]; then
            LINES=$(wc -l < manifests/apex_manifest.csv || true)
            echo "lines=$LINES" >> $GITHUB_OUTPUT
            echo "preview<<EOF" >> $GITHUB_OUTPUT
            head -n 8 manifests/apex_manifest.csv || true
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "lines=0" >> $GITHUB_OUTPUT
            echo "preview<<EOF" >> $GITHUB_OUTPUT
            echo "(no manifest generated)"
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create or update BMAD Apex Watch issue
        uses: actions/github-script@v6
        env:
          MANIFEST_LINES: ${{ steps.manifest.outputs.lines }}
          MANIFEST_PREVIEW: ${{ steps.manifest.outputs.preview }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const title = 'BMAD: Apex Watch';
            const now = new Date().toISOString();
            let apex_md = '(no APEX_SWIMLANES.md generated)';
            try { apex_md = fs.readFileSync('APEX_SWIMLANES.md','utf8'); } catch(e) {}
            const manifestLines = process.env.MANIFEST_LINES || '0';
            const manifestPreview = process.env.MANIFEST_PREVIEW || '(no manifest)';
            const body = `Automated BMAD watch run on ${now}\n\n---\n\n${apex_md}\n\n---\n\nManifest lines: ${manifestLines}\n\n${manifestPreview}`;
            const resp = await github.rest.issues.listForRepo({ owner: context.repo.owner, repo: context.repo.repo, state: 'open', per_page: 100 });
            const issues = resp.data || [];
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title, body });
            }