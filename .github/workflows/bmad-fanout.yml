name: "BMAD: Auto-Fanout from TODO"

on:
  push:
    paths:
      - 'TODO.md'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  extract-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pyyaml requests

      - name: Extract APEX stories from TODO
        id: extract
        run: |
          python3 scripts/extract_apex_swimlanes.py TODO.md \
            --auto-promote \
            --emit-stories \
            --story-dir docs/stories \
            --manifest /tmp/apex_manifest.csv

          # Extract story paths from manifest
          STORY_PATHS=$(tail -n +2 /tmp/apex_manifest.csv | cut -d, -f4)
          echo "story_paths<<EOF" >> $GITHUB_OUTPUT
          echo "$STORY_PATHS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          STORY_COUNT=$(echo "$STORY_PATHS" | wc -l)
          echo "count=$STORY_COUNT" >> $GITHUB_OUTPUT

      - name: Commit generated stories
        run: |
          git config user.name "bmad-fanout[bot]"
          git config user.email "bmad-fanout[bot]@users.noreply.github.com"

          git add docs/stories/*.story.md
          git diff --staged --quiet || \
            git commit -m "chore: auto-generate APEX stories from TODO.md

          Extracted ${{ steps.extract.outputs.count }} stories via BMAD fanout.

          🤖 Auto-generated by BMAD fanout extractor"

          git push

      - name: Dispatch executor for each story
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Read story paths from manifest
          while IFS=, read -r task_id swimlane slug story_path issue labels; do
            # Skip header
            if [ "$task_id" = "task_id" ]; then continue; fi

            # Skip if story_path is empty
            if [ -z "$story_path" ]; then continue; fi

            echo "📤 Dispatching executor for: $story_path (swimlane: $swimlane)"

            # Dispatch bmad-executor workflow
            gh workflow run bmad-executor.yml \
              -f "story_path=$story_path" || echo "⚠️  Dispatch failed for $story_path"

            # Rate limit: wait between dispatches
            sleep 2
          done < /tmp/apex_manifest.csv

      - name: Summary
        run: |
          echo "## BMAD Fanout Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Extracted ${{ steps.extract.outputs.count }} APEX stories from TODO.md" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stories dispatched to executor:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          cat /tmp/apex_manifest.csv >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
