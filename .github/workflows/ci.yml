name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake clang libc++-dev libc++abi-dev llvm-dev libmlir-18-dev

    - name: Set up LLVM/MLIR path
      run: |
        # Find LLVM installation path
        LLVM_PATH=$(find /usr -name "llvm-config" -type f 2>/dev/null | head -1 | xargs dirname | xargs dirname)
        if [ -z "$LLVM_PATH" ]; then
          LLVM_PATH="/usr"
        fi
        echo "CMAKE_PREFIX_PATH=$LLVM_PATH" >> $GITHUB_ENV

    - name: Build project
      run: |
        mkdir -p build
        cd build
        cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_COMPILER=clang++
        cmake --build .

    - name: Run regression tests
      run: |
        chmod +x regression-tests/run_tests.sh
        ./regression-tests/run_tests.sh

    - name: Run attestation (if available)
      run: |
        if [ -f build/anticheat ]; then
          # Run attestation on a test binary if it exists
          if [ -f test_binary ]; then
            ./build/anticheat ./test_binary || true
          fi
        fi

  intelligent-refinement-dispatch:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: failure() || success()  # Run on any completion to check for refinement opportunities
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Analyze Build and Test Results
      id: analyze
      run: |
        # Check build status
        BUILD_FAILED=false
        if [ "${{ needs.build-and-test.result }}" = "failure" ]; then
          BUILD_FAILED=true
        fi

        # Check for test failures (look for test result files)
        TEST_FAILED=false
        if [ -f regression-tests/test_results.txt ]; then
          if ! grep -q "PASS\|OK" regression-tests/test_results.txt; then
            TEST_FAILED=true
          fi
        fi

        # Check for linting issues (if clang-tidy or similar was run)
        LINT_ISSUES=false
        # Add logic to check for linting output if available

        # Determine refinement action
        DISPATCH_AGENT=""
        REFINEMENT_TYPE=""
        STORY_PATH=""

        if [ "$BUILD_FAILED" = "true" ]; then
          DISPATCH_AGENT="dev"
          REFINEMENT_TYPE="build-failure"
          STORY_PATH="docs/stories/refinement-build-failure.story.md"
        elif [ "$TEST_FAILED" = "true" ]; then
          DISPATCH_AGENT="qa"
          REFINEMENT_TYPE="test-failure"
          STORY_PATH="docs/stories/refinement-test-failure.story.md"
        elif [ "$LINT_ISSUES" = "true" ]; then
          DISPATCH_AGENT="dev"
          REFINEMENT_TYPE="code-quality"
          STORY_PATH="docs/stories/refinement-code-quality.story.md"
        fi

        # Create refinement story if needed
        if [ -n "$DISPATCH_AGENT" ]; then
          mkdir -p docs/stories
          cat > "$STORY_PATH" << EOF
        # Refinement: Fix $REFINEMENT_TYPE

        ## Status: Draft

        ## Story
        As a developer,
        I want to fix the $REFINEMENT_TYPE issues detected in CI,
        So that the codebase maintains quality standards.

        ## Context
        This refinement task was automatically created by CI analysis.
        Build/Test Status: ${{ needs.build-and-test.result }}
        Commit: ${{ github.sha }}
        Branch: ${{ github.ref_name }}

        ## Acceptance Criteria
        1. $REFINEMENT_TYPE issues are resolved
        2. CI pipeline passes successfully
        3. Code quality standards are maintained

        ## Tasks / Subtasks
        - [ ] Analyze the $REFINEMENT_TYPE details from CI logs
        - [ ] Implement fixes for identified issues
        - [ ] Run tests to verify fixes
        - [ ] Ensure no regressions introduced

        ## Dev Notes
        - CI Run: ${{ github.run_id }}
        - Agent: $DISPATCH_AGENT
        - Swimlane: ci-refinement

        swimlane: ci-refinement
        EOF
        fi

        echo "dispatch_agent=$DISPATCH_AGENT" >> $GITHUB_OUTPUT
        echo "refinement_type=$REFINEMENT_TYPE" >> $GITHUB_OUTPUT
        echo "story_path=$STORY_PATH" >> $GITHUB_OUTPUT
        echo "needs_refinement=$([ -n "$DISPATCH_AGENT" ] && echo "true" || echo "false")" >> $GITHUB_OUTPUT

    - name: Dispatch BMAD Agent for Refinement
      if: steps.analyze.outputs.needs_refinement == 'true'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "🔧 Detected refinement opportunity: ${{ steps.analyze.outputs.refinement_type }}"
        echo "🤖 Dispatching ${{ steps.analyze.outputs.dispatch_agent }} agent"

        # Trigger BMAD executor workflow
        gh workflow run bmad-executor.yml \
          -f "story_path=${{ steps.analyze.outputs.story_path }}"

        # Create an issue for tracking
        ISSUE_BODY="## 🤖 CI Refinement Dispatch

        **Type:** ${{ steps.analyze.outputs.refinement_type }}
        **Agent:** ${{ steps.analyze.outputs.dispatch_agent }}
        **Story:** ${{ steps.analyze.outputs.story_path }}
        **CI Run:** ${{ github.run_id }}
        **Commit:** ${{ github.sha }}

        The CI pipeline detected issues requiring refinement. A BMAD agent has been dispatched to address this automatically.

        ### Status
        - 🔄 Agent dispatched
        - 📝 Story created: ${{ steps.analyze.outputs.story_path }}
        - 🔗 [View CI Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

        ---
        🤖 Auto-generated by Intelligent BMAD Dispatch"

        gh issue create \
          --title "🤖 CI Refinement: ${{ steps.analyze.outputs.refinement_type }}" \
          --body "$ISSUE_BODY" \
          --label "apex,ci-refinement"