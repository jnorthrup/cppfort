name: Extractor smoke test

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'scripts/**'
      - 'TODO.md'
      - '.bmad-core/**'

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml cryptography requests
      - name: Run extractor (smoke)
        run: |
          python3 scripts/extract_apex_swimlanes.py TODO.md --auto-promote --manifest manifests/apex_manifest.csv
        env:
          BMAD_DISABLE_LOCAL_AUDIT: '1'
