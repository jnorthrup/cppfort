name: "Fan-in: Integration pipeline for integration/apex"

on:
  push:
    branches:
      - 'integration/apex'

jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up CMake & build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential cmake ninja-build
      - name: Configure CMake
        run: |
          mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: |
          cd build && cmake --build . -j2
      - name: Run unit tests (if any)
        run: |
          # Placeholder for unit test invocation; adapt as needed
          echo "Running unit tests..."
      - name: Run regression tests (fast smoke)
        run: |
          if [ -x build/stage1_cli ]; then
            ./build/stage1_cli regression-tests/mixed-bounds-check.cpp >/dev/null || true
          else
            echo "stage1_cli not built; skipping smoke regression"
          fi
      - name: Install Python requirements
        run: python -m pip install -r requirements.txt
      - name: Run extractor and manifest consistency check
        run: |
          mkdir -p manifests
          python3 scripts/extract_apex_swimlanes.py TODO.md --emit-stories --story-dir docs/stories --manifest manifests/apex_manifest.csv --quiet > APEX_SWIMLANES.md
          if [ -f manifests/apex_manifest.csv ]; then
            if [ -f manifests/apex_manifest.csv ]; then
              echo "Found generated manifest; comparing to repo manifest (if present)"
            fi
          fi
          # If repo has committed manifest, compare and fail on diff
          if [ -f manifests/apex_manifest.csv ] && git ls-files --error-unmatch manifests/apex_manifest.csv >/dev/null 2>&1; then
            git --no-pager diff --exit-code -- manifests/apex_manifest.csv || (echo "Manifest differs from committed version" && exit 2)
          fi
      - name: Run attestation & benchmarks (placeholders)
        run: |
          echo "Running attestation and benchmark placeholders..."
      - name: Create integration artifact
        uses: actions/upload-artifact@v4
        with:
          name: apex-integration-artifacts
          path: |
            APEX_SWIMLANES.md
            build/
