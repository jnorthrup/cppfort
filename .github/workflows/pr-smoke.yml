name: PR Smoke Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  smoke:
    name: Smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Quick shell syntax check for scripts
        run: |
          set -euo pipefail
          if command -v shellcheck >/dev/null 2>&1; then
            shellcheck -x scripts/*.sh || true
          else
            echo "shellcheck not available, running 'bash -n' checks"
            for f in scripts/*.sh; do
              echo "checking $f"
              bash -n "$f"
            done
          fi

      - name: Basic docs presence check
        run: |
          echo "Listing key docs to ensure they exist"
          test -f docs/band-5/plan.md && echo "plan.md present" || (echo "plan.md missing"; exit 1)
          test -f .github/PULL_REQUEST_TEMPLATE.md && echo "PR template present" || (echo "PR template missing"; exit 1)
