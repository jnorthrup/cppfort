# Unified OrbitPattern Database - Common Tree Trunk Grammar
# Comprehensive grooming of C, C++, CPP2 orbits to reflect unified AST structures
# Where deviations are negligible, patterns are merged into common trunks
# Where deviations are significant, peer mappings preserve disambiguation

---
# ===== COMMON TREE TRUNK PATTERNS =====
# These patterns represent unified AST structures across all three grammars

name: unified_declaration_trunk
orbit_id: 1
signature_patterns:
  - "x : int = 5"      # CPP2 canonical
  - "int x = 5"        # C/C++ canonical
  - "auto x = 5"       # C++11+ unified
weight: 1.0
grammar_modes: 7  # All modes (C | CPP | CPP2)
lattice_filter: 65535  # All classes
prev_tokens: []
next_tokens: []
scope_requirement: any
confix_mask: 63  # All scopes

---
name: unified_function_trunk
orbit_id: 2
signature_patterns:
  - "f : (x : int) -> int = { return x; }"  # CPP2 canonical
  - "int f(int x) { return x; }"            # C/C++ canonical
  - "auto f(int x) { return x; }"           # C++ unified
weight: 1.0
grammar_modes: 7  # All modes
lattice_filter: 65535
prev_tokens: []
next_tokens: []
scope_requirement: global
confix_mask: 1  # Top level only

---
name: unified_type_definition_trunk
orbit_id: 3
signature_patterns:
  - "T : type = { x: int; }"        # CPP2 canonical
  - "struct T { int x; };"          # C/C++ canonical
  - "class T { public: int x; };"   # C++ unified
weight: 1.0
grammar_modes: 7  # All modes
lattice_filter: 65535
prev_tokens: []
next_tokens: []
scope_requirement: global
confix_mask: 1

---
name: unified_namespace_trunk
orbit_id: 4
signature_patterns:
  - "ns : namespace = { ... }"      # CPP2 canonical
  - "namespace ns { ... }"          # C++ canonical
  - "/* C has no namespace */"      # C note
weight: 0.9
grammar_modes: 6  # CPP | CPP2 (C excluded)
lattice_filter: 65535
prev_tokens: []
next_tokens: []
scope_requirement: global
confix_mask: 1

---
name: unified_control_flow_trunk
orbit_id: 5
signature_patterns:
  - "if (cond) { ... }"             # All languages
  - "while (cond) { ... }"          # All languages
  - "for (init; cond; incr) { ... }" # All languages
weight: 1.0
grammar_modes: 7  # All modes
lattice_filter: 65535
prev_tokens: []
next_tokens: []
scope_requirement: any
confix_mask: 63

---
name: unified_expression_trunk
orbit_id: 6
signature_patterns:
  - "x + y * z"     # Arithmetic (all languages)
  - "a && b || c"   # Logical (all languages)
  - "x = y + z"     # Assignment (all languages)
weight: 1.0
grammar_modes: 7  # All modes
lattice_filter: 65535
prev_tokens: []
next_tokens: []
scope_requirement: any
confix_mask: 63

